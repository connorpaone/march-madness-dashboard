<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{margin:0;font-family:Arial;background:#f4f6ef}
.container{display:flex;height:100vh}
.left,.right{width:50%;padding:20px}
.row{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #ccc}
</style>
</head>
<body>
<div class="container">
<div class="left">
<h2>Leaderboard</h2>
<div id="lb"></div>
</div>
<div class="right">
<h2>Live Scores</h2>
<div id="scores"></div>
</div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbNjN9MOqFcLg0btkJd7GTesA44lLyGRmNij3c_i_hLWgcFPGDwRimCypWjmqr8WHr-d-9stAwFTl/pub?gid=0&single=true&output=csv";

async function loadLeaderboard(){
  try{
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const rows = text.trim().split("\n").map(r=>r.split(","));
    const header = rows[0].map(h=>h.toLowerCase());

    const rankI = header.indexOf("rank");
    const nameI = header.indexOf("name");
    const ptsI = header.indexOf("points");

    const mount = document.getElementById("lb");
    mount.innerHTML = "";

    rows.slice(1).forEach(r=>{
      if(!r[nameI]) return;
      const d=document.createElement("div");
      d.className="row";
      d.innerHTML=`<div>${r[rankI]} ${r[nameI]}</div><div>${r[ptsI]}</div>`;
      mount.appendChild(d);
    });

  }catch(e){
    document.getElementById("lb").innerHTML="Error loading leaderboard";
  }
}

async function loadScores(){
  try{
    const res = await fetch("https://ncaa-api.henrygd.me/scoreboard/basketball-men/d1");
    const data = await res.json();

    const games = data.games || [];
    const mount = document.getElementById("scores");
    mount.innerHTML = "";

    games.slice(0,10).forEach(g=>{
      const gm = g.game;
      const d=document.createElement("div");
      d.className="row";
      d.textContent = `${gm.away.names.short} ${gm.away.score} - ${gm.home.score} ${gm.home.names.short}`;
      mount.appendChild(d);
    });

  }catch(e){
    document.getElementById("scores").innerHTML="Scores unavailable";
  }
}

loadLeaderboard();
loadScores();
</script>
</body>
</html>
