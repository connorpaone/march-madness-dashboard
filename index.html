<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>March Madness Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter;background:#f4f6ef}
.container{display:flex;height:100vh}
.left{width:50%;padding:16px;overflow:hidden}
.right{width:50%;padding:16px;background:#fff;overflow:hidden}

.header{font-size:32px;font-weight:800;margin-bottom:10px}

.rows{height:calc(100% - 60px);overflow:hidden;position:relative}
.track{position:absolute;width:100%}
.row{display:flex;justify-content:space-between;padding:12px 8px;border-bottom:1px solid #ddd;font-size:20px}

.ticker{display:flex;flex-direction:column;gap:10px}
.game{font-size:20px;font-weight:600}
</style>
</head>
<body>
<div class="container">

<div class="left">
<div class="header">Leaderboard</div>
<div class="rows" id="rows"></div>
</div>

<div class="right">
<div class="header">Live Scores</div>
<div class="ticker" id="scores"></div>
</div>

</div>

<script>
const SHEET_ID='14W_0zczXrnkCaMxAzEHBkOrapSksXiEZu1MtSxEkqVA'

function loadSheet(){
  const s=document.createElement('script')
  s.src=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=0&tqx=out:json;responseHandler=handle`
  document.body.appendChild(s)
}

window.handle=function(p){
  const rows=p.table.rows.map(r=>r.c.map(c=>c?c.v:''))
  const mount=document.getElementById('rows')
  mount.innerHTML='<div class="track" id="track"></div>'
  const track=document.getElementById('track')

  rows.slice(1).forEach(r=>{
    const d=document.createElement('div')
    d.className='row'
    d.innerHTML=`<div>${r[0]} ${r[1]}</div><div>${r[2]}</div>`
    track.appendChild(d)
  })

  scroll()
}

function scroll(){
  const t=document.getElementById('track')
  let y=0
  setInterval(()=>{
    y+=1
    t.style.transform=`translateY(-${y}px)`
    if(y>t.scrollHeight) y=0
  },30)
}

async function loadScores(){
  try{
    const res=await fetch('https://ncaa-api.henrygd.me/scoreboard/basketball-men/d1')
    const data=await res.json()
    const games=data.games.filter(g=>g.game.championshipId)
    const el=document.getElementById('scores')
    el.innerHTML=''
    games.slice(0,12).forEach(g=>{
      const gm=g.game
      const div=document.createElement('div')
      div.className='game'
      div.textContent=`${gm.away.names.short} ${gm.away.score} - ${gm.home.score} ${gm.home.names.short}`
      el.appendChild(div)
    })
  }catch(e){console.log('scores fail')}
}

loadSheet()
loadScores()
setInterval(()=>location.reload(),300000)
</script>
</body>
</html>
