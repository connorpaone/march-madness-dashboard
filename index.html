<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>March Madness Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --apple: #BED344;
      --charcoal: #545454;
      --white: #FFFFFF;
      --slate: #8C8C8C;
      --steel: #C8C8C8;
      --platinum: #EBEBEB;
      --bg: #f4f6ef;
      --line: rgba(84,84,84,0.14);
      --shadow: 0 18px 42px rgba(84,84,84,0.12);
      --radius: 22px;
      --gold: #c8a227;
      --silver: #9ea3a8;
      --bronze: #b97a2b;
      --up: #5f8f1f;
      --down: #9a4b32;
      --text: #2f2f2f;
      --muted: #6f6f6f;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(190,211,68,0.24), transparent 28%),
        radial-gradient(circle at bottom right, rgba(190,211,68,0.10), transparent 22%),
        linear-gradient(180deg, #fafbf7 0%, var(--bg) 100%);
      color: var(--text);
      overflow: hidden;
    }

    .shell {
      height: 100vh;
      padding: 16px;
      display: grid;
      grid-template-rows: 92px 1fr 38px;
      gap: 12px;
    }

    .topbar, .footer, .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      background: rgba(255,255,255,0.94);
    }

    .topbar, .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .badge {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      background: var(--apple);
      color: var(--charcoal);
      flex: 0 0 auto;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .submeta {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .content {
      min-height: 0;
      display: grid;
      grid-template-columns: 56% 44%;
      gap: 12px;
    }

    .panel {
      min-height: 0;
      display: grid;
      grid-template-rows: 64px 52px 1fr;
      overflow: hidden;
    }

    .scores-panel {
      grid-template-rows: 64px 1fr;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      font-size: 22px;
      font-weight: 800;
    }

    .panel-sub {
      font-size: 14px;
      color: var(--muted);
      font-weight: 700;
      text-align: right;
    }

    .lb-head, .lb-row {
      display: grid;
      grid-template-columns: 74px minmax(180px,1fr) 96px 112px 72px;
      gap: 12px;
      align-items: center;
      padding: 0 18px;
    }

    .lb-head {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 800;
      border-bottom: 1px solid var(--line);
      background: rgba(235,235,235,0.35);
    }

    .leaderboard-body, .scores-body {
      min-height: 0;
      overflow: auto;
      padding: 10px;
    }

    .leaderboard-body::-webkit-scrollbar,
    .scores-body::-webkit-scrollbar {
      width: 10px;
    }

    .leaderboard-body::-webkit-scrollbar-thumb,
    .scores-body::-webkit-scrollbar-thumb {
      background: rgba(84,84,84,0.2);
      border-radius: 999px;
    }

    .lb-row {
      height: 64px;
      margin-bottom: 8px;
      border-radius: 14px;
      border: 1px solid rgba(84,84,84,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,251,247,0.94));
      position: relative;
      overflow: hidden;
    }

    .lb-row::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: var(--steel);
    }

    .lb-row.top-1::before { background: var(--gold); }
    .lb-row.top-2::before { background: var(--silver); }
    .lb-row.top-3::before { background: var(--bronze); }

    .rank { font-size: 28px; font-weight: 800; }
    .name {
      font-size: 24px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .metric { text-align: right; font-size: 26px; font-weight: 800; }
    .delta { text-align: right; font-size: 18px; font-weight: 800; color: var(--slate); }
    .delta.up { color: var(--up); }
    .delta.down { color: var(--down); }

    .score-card {
      border: 1px solid rgba(84,84,84,0.08);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,251,247,0.94));
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.10em;
      color: var(--muted);
      font-weight: 800;
    }

    .team-row {
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 12px;
      align-items: center;
      padding: 4px 0;
    }

    .team-name {
      font-size: 22px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .team-score {
      text-align: right;
      font-size: 28px;
      font-weight: 800;
    }

    .message {
      border: 1px dashed rgba(84,84,84,0.16);
      border-radius: 16px;
      padding: 18px;
      color: var(--muted);
      background: rgba(255,255,255,0.7);
      font-size: 16px;
      line-height: 1.45;
    }

    .footer {
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    @media (max-width: 1400px) {
      .content { grid-template-columns: 54% 46%; }
      .lb-head, .lb-row {
        grid-template-columns: 64px minmax(140px,1fr) 84px 100px 64px;
        gap: 10px;
      }
      .name { font-size: 21px; }
      .metric { font-size: 23px; }
      .rank { font-size: 25px; }
      .team-name { font-size: 20px; }
      .team-score { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="badge">MM</div>
        <div class="title">March Madness Dashboard</div>
      </div>
      <div class="submeta">Auto-refresh 5m</div>
    </header>

    <main class="content">
      <section class="panel">
        <div class="panel-head">
          <div class="panel-title">Leaderboard</div>
          <div class="panel-sub" id="leaderboardCount">Loading...</div>
        </div>

        <div class="lb-head">
          <div>Rank</div>
          <div>Name</div>
          <div style="text-align:right;">PTS</div>
          <div style="text-align:right;">PTS REM</div>
          <div style="text-align:right;">Δ</div>
        </div>

        <div class="leaderboard-body" id="leaderboardBody">
          <div class="message">Loading leaderboard...</div>
        </div>
      </section>

      <section class="panel scores-panel">
        <div class="panel-head">
          <div class="panel-title">Live Scores</div>
          <div class="panel-sub" id="scoresCount">Checking feed...</div>
        </div>

        <div class="scores-body" id="scoresBody">
          <div class="message">Loading scores...</div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div>Leaderboard: Google Sheet</div>
      <div>Scores: scores.json</div>
    </footer>
  </div>

  <script>
    const CONFIG = {
      csvUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRvbNjN9MOqFcLg0btkJd7GTesA44lLyGRmNij3c_i_hLWgcFPGDwRimCypWjmqr8WHr-d-9stAwFTl/pub?gid=0&single=true&output=csv',
      scoresUrl: './scores.json',
      refreshMs: 300000
    };

    function normalizeHeader(str) {
      return String(str || '').trim().toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function parseCsvLine(line) {
      const out = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        const next = line[i + 1];

        if (ch === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === ',' && !inQuotes) {
          out.push(current);
          current = '';
        } else {
          current += ch;
        }
      }

      out.push(current);
      return out.map(v => v.trim());
    }

    function parseCsv(text) {
      const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
      if (!lines.length) return { headers: [], rows: [] };

      return {
        headers: parseCsvLine(lines[0]),
        rows: lines.slice(1).map(parseCsvLine)
      };
    }

    function pickIndex(headerMap, options) {
      for (const option of options) {
        const key = normalizeHeader(option);
        if (headerMap[key] !== undefined) return headerMap[key];
      }
      return -1;
    }

    function movementFromRanks(rank, prevRank) {
      if (!Number.isFinite(rank) || !Number.isFinite(prevRank)) return '—';
      if (rank < prevRank) return '↑' + (prevRank - rank);
      if (rank > prevRank) return '↓' + (rank - prevRank);
      return '—';
    }

    function deltaClass(delta) {
      if (String(delta).includes('↑')) return 'up';
      if (String(delta).includes('↓')) return 'down';
      return '';
    }

    async function loadLeaderboard() {
      const body = document.getElementById('leaderboardBody');

      try {
        const res = await fetch(CONFIG.csvUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const text = await res.text();
        const { headers, rows } = parseCsv(text);

        const headerMap = {};
        headers.forEach((h, i) => { headerMap[normalizeHeader(h)] = i; });

        const rankIdx = pickIndex(headerMap, ['rank', 'rnk']);
        const nameIdx = pickIndex(headerMap, ['name', 'entry', 'entry name', 'player']);
        const pointsIdx = pickIndex(headerMap, ['pts', 'points', 'score']);
        const maxIdx = pickIndex(headerMap, ['pts rem', 'pts remaining', 'max', 'max points', 'maxpoints']);
        const refreshedIdx = pickIndex(headerMap, ['last refreshed', 'refreshed', 'updated']);
        const prevIdx = pickIndex(headerMap, ['prevrank', 'previous rank']);
        const deltaIdx = pickIndex(headerMap, ['delta', 'movement']);

        if (rankIdx < 0 || nameIdx < 0 || pointsIdx < 0 || maxIdx < 0) {
          throw new Error('Sheet headers not recognized. Expected rank, name, PTS, and PTS REM.');
        }

        const cleaned = rows.map(r => {
          const rank = Number(String(r[rankIdx] || '').replace(/[^0-9.-]/g, ''));
          const prevRank = Number(String(r[prevIdx] || '').replace(/[^0-9.-]/g, ''));
          const delta = deltaIdx >= 0
            ? String(r[deltaIdx] || '').trim()
            : movementFromRanks(rank, prevRank);

          return {
            rank: Number.isFinite(rank) ? rank : '',
            name: String(r[nameIdx] || '').trim(),
            points: String(r[pointsIdx] || '').trim(),
            max: String(r[maxIdx] || '').trim(),
            delta,
            refreshed: refreshedIdx >= 0 ? String(r[refreshedIdx] || '').trim() : ''
          };
        }).filter(r => r.name);

        document.getElementById('leaderboardCount').textContent = cleaned.length + ' players';

        body.innerHTML = '';

        cleaned.forEach((row, index) => {
          const el = document.createElement('div');
          el.className = 'lb-row' + (index < 3 ? ' top-' + (index + 1) : '');
          el.innerHTML = `
            <div class="rank">${row.rank}</div>
            <div class="name">${row.name}</div>
            <div class="metric">${row.points}</div>
            <div class="metric">${row.max}</div>
            <div class="delta ${deltaClass(row.delta)}">${row.delta || '—'}</div>
          `;
          body.appendChild(el);
        });

        if (!cleaned.length) {
          body.innerHTML = '<div class="message">No leaderboard rows found.</div>';
        }
      } catch (err) {
        body.innerHTML = '<div class="message">Leaderboard failed to load: ' + String(err.message || err) + '</div>';
        document.getElementById('leaderboardCount').textContent = 'Load error';
      }
    }

    async function loadScores() {
      const body = document.getElementById('scoresBody');

      try {
        const res = await fetch(CONFIG.scoresUrl + '?t=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);

        const data = await res.json();
        const games = Array.isArray(data.games) ? data.games : [];

        document.getElementById('scoresCount').textContent = games.length
          ? games.length + ' games'
          : 'No tournament games';

        body.innerHTML = '';

        if (!games.length) {
          body.innerHTML = '<div class="message">No tournament games found in scores.json.</div>';
          return;
        }

        games.forEach(game => {
          const card = document.createElement('div');
          card.className = 'score-card';
          card.innerHTML = `
            <div class="score-top">
              <div>${game.status || 'Live'}</div>
              <div>${game.round || 'Tournament'}</div>
            </div>
            <div class="team-row">
              <div class="team-name">${(game.away && game.away.name) || 'Away'}</div>
              <div class="team-score">${(game.away && game.away.score) ?? ''}</div>
            </div>
            <div class="team-row">
              <div class="team-name">${(game.home && game.home.name) || 'Home'}</div>
              <div class="team-score">${(game.home && game.home.score) ?? ''}</div>
            </div>
          `;
          body.appendChild(card);
        });
      } catch (err) {
        body.innerHTML = '<div class="message">Scores failed to load: ' + String(err.message || err) + '</div>';
        document.getElementById('scoresCount').textContent = 'Feed error';
      }
    }

    loadLeaderboard();
    loadScores();
    setInterval(() => location.reload(), CONFIG.refreshMs);
  </script>
</body>
</html>
